```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VRM Viewer</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#20242d;
    font-family:Arial,sans-serif;
}
#loading{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,.5);
    padding:10px 15px;
    border-radius:10px;
}
</style>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

</head>

<body>

<div id="loading">Loading VRM...</div>

<script type="module">

import * as THREE from "three";

import { OrbitControls }
from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

import { GLTFLoader }
from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

import { VRMLoaderPlugin }
from "https://unpkg.com/@pixiv/three-vrm@2.1.1/lib/three-vrm.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
35,
window.innerWidth/window.innerHeight,
0.1,
100
);

camera.position.set(0,1.4,3);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.target.set(0,1.3,0);
controls.update();

const light1=new THREE.DirectionalLight(0xffffff,2);
light1.position.set(1,1,1);
scene.add(light1);

const light2=new THREE.AmbientLight(0xffffff,1.5);
scene.add(light2);

const loader=new GLTFLoader();

loader.register((parser)=>{
    return new VRMLoaderPlugin(parser);
});

loader.load(
"./avatar.vrm",

(gltf)=>{

const vrm=gltf.userData.vrm;

scene.add(vrm.scene);

document.getElementById("loading").style.display="none";

},

(progress)=>{

document.getElementById("loading").innerHTML=
"Loading "+Math.floor(progress.loaded/progress.total*100)+"%";

},

(error)=>{

console.error(error);

document.getElementById("loading").innerHTML=
"โหลดไฟล์ avatar.vrm ไม่สำเร็จ";

}

);

function animate(){

requestAnimationFrame(animate);

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
