<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI E-Service</title>

    <meta name="theme-color" content="#0d6efd">

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="icons/icon-192.png">

</head>

<body>

<header>
    <h1>🏛 AI E-Service</h1>
    <p>องค์การบริหารส่วนตำบลแม่สลองนอก</p>
</header>

<div class="container">

    <button onclick="openChat()">🤖 AI ผู้ช่วย</button>

    <button onclick="alert('ระบบแจ้งเหตุ')">
        🚨 แจ้งเหตุฉุกเฉิน
    </button>

    <button onclick="alert('ระบบยื่นคำร้อง')">
        📄 ยื่นคำร้องออนไลน์
    </button>

    <button onclick="alert('ตรวจสอบสถานะคำร้อง')">
        📋 ตรวจสอบคำร้อง
    </button>

    <button onclick="alert('ติดต่อ อบต.')">
        ☎ ติดต่อเจ้าหน้าที่
    </button>

</div>

<div id="chatBox" class="chat">
    <h2>AI Assistant</h2>

    <div id="messages"></div>

    <input
        id="userInput"
        placeholder="พิมพ์คำถาม..."
    >

    <button onclick="sendMessage()">ส่ง</button>

</div>

<script src="app.js"></script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js');

}

</script>

</body>
</html>
